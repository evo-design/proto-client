repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
  # Regenerate sync modules whenever the async sources change. The generated
  # files are committed — unasync is a build-time tool, not a runtime dep.
  - repo: local
    hooks:
      - id: unasync-gen-sync
        name: unasync → regenerate sync modules
        entry: python scripts/gen_sync.py
        language: system
        pass_filenames: false
        # Trigger on any async source change; gen_sync.py's SYNC_TARGETS
        # controls which files actually get transformed.
        files: ^proto_client/_async/.*\.py$
